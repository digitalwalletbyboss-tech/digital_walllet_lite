<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Digital Wallet • Lite finance tracker</title>
  <meta name="theme-color" content="#83FFDF">
  <link rel="apple-touch-icon" href="images/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      background: #f4f6fa;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 1.25rem;
      margin: 0;
    }
    
    .app-container {
      max-width: 500px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    
    .card {
      background: #ffffff;
      border-radius: 1.5rem;
      padding: 1.5rem 1.25rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
      backdrop-filter: blur(2px);
      transition: all 0.2s ease;
    }
    
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    
    h2 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #1e293b;
      letter-spacing: -0.2px;
    }
    
    h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: 0.75rem;
    }
    
    .icon-btn {
      background: #f1f5f9;
      border: none;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 2rem;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #475569;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }
    
    .icon-btn:hover {
      background: #e2e8f0;
      color: #0f172a;
    }
    
    .total-balance-big {
      font-size: 2.6rem;
      font-weight: 700;
      color: #0f172a;
      margin: 0.4rem 0 0.2rem;
    }
    
    .in-ex-row {
      display: flex;
      gap: 1.8rem;
      margin-top: 0.5rem;
      margin-bottom: 1.2rem;
    }
    
    .income-text {
      color: #0f7b3f;
      font-weight: 600;
      background: #e6f4ea;
      padding: 0.25rem 1rem;
      border-radius: 2rem;
      font-size: 0.95rem;
    }
    
    .expense-text {
      color: #b91c1c;
      font-weight: 600;
      background: #fee9e9;
      padding: 0.25rem 1rem;
      border-radius: 2rem;
      font-size: 0.95rem;
    }
    
    .actions {
      display: flex;
      gap: 0.8rem;
    }
    
    .action-btn {
      flex: 1;
      padding: 0.8rem 0.5rem;
      border: none;
      border-radius: 2.5rem;
      font-weight: 600;
      font-size: 1rem;
      background: #f1f5f9;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }
    
    .cash-in-btn {
      background: #0f172a;
      color: white;
    }
    
    .cash-out-btn {
      background: #f1f5f9;
      color: #0f172a;
    }
    
    .filters-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.5rem;
    }
    
    .filter-date-group {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: #f8fafc;
      padding: 0.3rem 0.7rem;
      border-radius: 2rem;
      font-size: 0.85rem;
    }
    
    input[type="date"] {
      border: 1px solid #e2e8f0;
      border-radius: 1.5rem;
      padding: 0.4rem 0.6rem;
      font-size: 0.8rem;
      background: white;
      outline: none;
    }
    
    .entry-tabs {
      display: flex;
      gap: 0.4rem;
      margin: 0.8rem 0 1rem;
      background: #f1f5f9;
      padding: 0.3rem;
      border-radius: 2.5rem;
    }
    
    .entry-tab {
      flex: 1;
      text-align: center;
      padding: 0.5rem;
      border: none;
      background: transparent;
      border-radius: 2rem;
      font-weight: 500;
      color: #475569;
      cursor: pointer;
      transition: 0.2s;
    }
    
    .entry-tab.active-entries {
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      color: #0f172a;
      font-weight: 600;
    }
    
    .balance-summary {
      display: flex;
      justify-content: space-between;
      background: #f8fafc;
      padding: 0.8rem 1rem;
      border-radius: 1.2rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    
    .entry-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 0.2rem;
    }
    
    .entry-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #edf2f7;
      padding-bottom: 0.6rem;
    }
    
    .entry-left {
      display: flex;
      flex-direction: column;
    }
    
    .entry-type {
      font-weight: 600;
      color: #1e293b;
    }
    
    .entry-meta {
      font-size: 0.7rem;
      color: #64748b;
    }
    
    .entry-amount {
      font-weight: 700;
    }
    
    .in-color {
      color: #0f7b3f;
    }
    
    .out-color {
      color: #b91c1c;
    }
    
    .chart-toggle-btns {
      display: flex;
      gap: 0.4rem;
      margin: 0.8rem 0;
      background: #f1f5f9;
      padding: 0.3rem;
      border-radius: 2.5rem;
    }
    
    .chart-toggle-btn {
      flex: 1;
      text-align: center;
      padding: 0.5rem;
      border: none;
      background: transparent;
      border-radius: 2rem;
      font-weight: 500;
      color: #475569;
      cursor: pointer;
      transition: 0.2s;
    }
    
    .chart-toggle-btn.active-chart {
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      color: #0f172a;
      font-weight: 600;
    }
    
    .chart-container {
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* modal */
    #modal-container {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    
    .modal-box {
      background: white;
      max-width: 340px;
      width: 90%;
      border-radius: 2rem;
      padding: 1.8rem;
      position: relative;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.15);
    }
    
    .modal-close {
      position: absolute;
      top: 0.8rem;
      right: 1.2rem;
      font-size: 1.8rem;
      cursor: pointer;
      color: #94a3b8;
    }
    
    .modal-input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 1.5rem;
      margin: 0.5rem 0;
      font-size: 0.9rem;
      outline: none;
    }
    
    .modal-btn {
      background: #0f172a;
      color: white;
      border: none;
      padding: 0.8rem;
      border-radius: 2rem;
      font-weight: 600;
      width: 100%;
      margin-top: 0.8rem;
      cursor: pointer;
    }
    
    hr {
      margin: 0.8rem 0;
      border-color: #e9eef3;
    }
    
    .save-indicator {
      font-size: 0.7rem;
      color: #64748b;
      text-align: right;
      margin-top: 0.3rem;
    }
    
    /* Add these to your existing <style> block */
    
    /* Smooth page load fade-in */
    .app-container {
      animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Button press effect */
    .action-btn,
    .icon-btn,
    .entry-tab,
    .chart-toggle-btn,
    .modal-btn {
      transition: transform 0.15s cubic-bezier(0.16, 1, 0.3, 1),
        background 0.2s ease,
        box-shadow 0.2s ease,
        color 0.2s ease;
    }
    
    .action-btn:active,
    .icon-btn:active,
    .modal-btn:active {
      transform: scale(0.95);
    }
    
    /* Tab switch smooth transition */
    .entry-tab,
    .chart-toggle-btn {
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    /* Entry items slide in */
    .entry-item {
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    
    .entry-item:hover {
      background: #f8fafc;
      transform: translateX(4px);
      border-radius: 0.5rem;
      padding-left: 0.5rem;
      padding-right: 0.5rem;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    /* Stagger entry animations */
    .entry-item:nth-child(1) {
      animation-delay: 0.05s;
    }
    
    .entry-item:nth-child(2) {
      animation-delay: 0.1s;
    }
    
    .entry-item:nth-child(3) {
      animation-delay: 0.15s;
    }
    
    .entry-item:nth-child(4) {
      animation-delay: 0.2s;
    }
    
    .entry-item:nth-child(5) {
      animation-delay: 0.25s;
    }
    
    .entry-item:nth-child(6) {
      animation-delay: 0.3s;
    }
    
    .entry-item:nth-child(7) {
      animation-delay: 0.35s;
    }
    
    .entry-item:nth-child(8) {
      animation-delay: 0.4s;
    }
    
    .entry-item:nth-child(9) {
      animation-delay: 0.45s;
    }
    
    .entry-item:nth-child(10) {
      animation-delay: 0.5s;
    }
    
    /* Modal smooth open/close */
    #modal-container {
      transition: opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    #modal-container[style*="display: flex"] {
      animation: modalFadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    
    @keyframes modalFadeIn {
      from {
        opacity: 0;
      }
      
      to {
        opacity: 1;
      }
    }
    
    .modal-box {
      animation: modalSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    
    @keyframes modalSlideUp {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    /* Balance number pulse on update */
    @keyframes balancePulse {
      0% {
        transform: scale(1);
      }
      
      50% {
        transform: scale(1.05);
      }
      
      100% {
        transform: scale(1);
      }
    }
    
    .total-balance-big.pulse {
      animation: balancePulse 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    /* Input focus glow */
    input[type="date"]:focus,
    .modal-input:focus {
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      border-color: #3A86FF;
      box-shadow: 0 0 0 3px rgba(58, 134, 255, 0.15);
      outline: none;
    }
    
    /* Smooth scrollbar */
    .entry-list {
      scroll-behavior: smooth;
    }
    
    .entry-list::-webkit-scrollbar {
      width: 4px;
    }
    
    .entry-list::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .entry-list::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
      transition: background 0.2s ease;
    }
    
    .entry-list::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    /* Save indicator fade */
    .save-indicator {
      transition: opacity 0.3s ease, color 0.3s ease;
    }
    
    /* Chart container fade transition */
    .chart-container svg {
      animation: chartFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    
    @keyframes chartFadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Balance numbers transition */
    #starting-balance-el,
    #ending-balance-el {
      transition: all 0.3s ease;
    }
    
    /* Filter button press */
    #apply-filter-btn {
      transition: transform 0.15s cubic-bezier(0.16, 1, 0.3, 1),
        background 0.2s ease,
        box-shadow 0.2s ease;
    }
    
    #apply-filter-btn:active {
      transform: scale(0.93);
      background: #1e293b;
    }
  </style>
</head>

  <script>
    (function() {
      // ---------- INDEXEDDB FUNCTIONS ----------
      const data_functions = {
        openDB: () => {
          return new Promise((resolve, reject) => {
            const request = indexedDB.open("walletDB", 1);
            
            request.onupgradeneeded = (e) => {
              const db = e.target.result;
              if (!db.objectStoreNames.contains("main_data_base")) {
                db.createObjectStore("main_data_base");
              }
            };
            
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject("DB open failed");
          });
        },
        
        saveData: async (data) => {
          const db = await data_functions.openDB();
          return new Promise((resolve, reject) => {
            const tx = db.transaction("main_data_base", "readwrite");
            const store = tx.objectStore("main_data_base");
            const req = store.put(data, "wallet_data");
            req.onsuccess = () => resolve(true);
            req.onerror = () => reject(false);
          });
        },
        
        getData: async () => {
          const db = await data_functions.openDB();
          return new Promise((resolve, reject) => {
            const tx = db.transaction("main_data_base", "readonly");
            const store = tx.objectStore("main_data_base");
            const req = store.get("wallet_data");
            req.onsuccess = () => resolve(req.result || null);
            req.onerror = () => reject(null);
          });
        }
      };
      
      // ---------- DATA STORE ----------
      const defaultData = {
        total_balance: 0,
        cashInData: {
          cash_in_types: {},
          cash_ins: {}
        },
        cashOutData: {
          cash_out_types: {},
          cash_outs: {}
        },
        daily_balances: {
          
        }
      };
      
      let mainData = JSON.parse(JSON.stringify(defaultData));
      let currentChartMode = 'income'; // 'income' or 'expense'
      
      // Helper: formatted date key
      function getNowDate() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        const hours = String(now.getHours()).padStart(2, "0");
        const minutes = String(now.getMinutes()).padStart(2, "0");
        const seconds = String(now.getSeconds()).padStart(2, "0");
        return `${year}-${month}-${day}T${hours}:${minutes}:${seconds}`;
      }
      
      function getDateOnlyFromKey(key) {
        return key.split('T')[0];
      }
      
      function formatDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }
      
      // ---------- UI ELEMENTS ----------
      const totalBalanceEl = document.getElementById('totalBalanceDisplay');
      const todayIncomeEl = document.getElementById('todayIncomeDisplay');
      const todayExpenseEl = document.getElementById('todayExpenseDisplay');
      const entriesDiv = document.getElementById('entries');
      const startingBalanceEl = document.getElementById('starting-balance-el');
      const endingBalanceEl = document.getElementById('ending-balance-el');
      const dashIncomeTypes = document.getElementById('dashIncomeTypes');
      const dashExpenseTypes = document.getElementById('dashExpenseTypes');
      const fromDateInput = document.getElementById('from-date');
      const toDateInput = document.getElementById('to-date');
      const gotoDateInput = document.getElementById('goto-date');
      const applyFilterBtn = document.getElementById('apply-filter-btn');
      const modalContainer = document.getElementById('modal-container');
      const modalDiv = document.getElementById('modal-div');
      const saveStatusEl = document.getElementById('save-status');
      const chartContainer = document.getElementById('dashboard-chart');
      
      // Tab buttons
      const tabButtons = document.querySelectorAll('.entry-tab');
      let currentTab = 'all';
      
      // ---------- CHART FUNCTION ----------
      const createLineChart = (options) => {
        const {
          container_id,
          width = 360,
          height = 200,
          data,
          yTicks = 5,
          xTickSize = 5,
          padding = { left: 50, right: 20, top: 30, bottom: 30 },
          line = { width: 3, glow: true, color: "#3A86FF" },
          colors = {
            text: "#999",
            grid: "#eee",
            gradientStart: "rgba(58, 134, 255, 0.3)",
            gradientEnd: "rgba(58, 134, 255, 0.05)"
          },
          curve_tension = 0.25,
          transition = 1.5,
          unit_label = "",
        } = options;
        
        const graphHeight = height - padding.top - padding.bottom;
        const graphWidth = width - padding.left - padding.right;
        
        function calculateScale() {
          const validData = data.filter(d => d.value !== null).map(d => d.value);
          const min = 0;
          const max = validData.length > 0 ? Math.max(...validData) * 1.2 : 100;
          const span = max - min || 1;
          
          return {
            min,
            max,
            span,
            scaleY: val => padding.top + graphHeight - ((val - min) / span) * graphHeight,
            scaleX: i => padding.left + (i / (data.length - 1 || 1)) * graphWidth
          };
        }
        
        const scale = calculateScale();
        
        const rawPoints = data.map((item, i) => {
          if (item.value === null) return null;
          return {
            x: scale.scaleX(i),
            y: scale.scaleY(item.value),
            value: item.value
          };
        });
        
        const validPoints = rawPoints.filter(p => p !== null);
        
        function buildSinglePath(rawPoints) {
          const filtered = rawPoints.filter(p => p !== null);
          if (filtered.length < 2) return { path: "", fillPath: "" };
          
          const path = smoothPath(filtered);
          
          const firstX = filtered[0].x;
          const lastX = filtered[filtered.length - 1].x;
          const baselineY = height - padding.bottom;
          const fillPath = `${path} L ${lastX} ${baselineY} L ${firstX} ${baselineY} Z`;
          
          return { path, fillPath };
        }
        
        function smoothPath(points) {
          if (points.length < 2) return "";
          let d = `M ${points[0].x} ${points[0].y}`;
          for (let i = 0; i < points.length - 1; i++) {
            const p0 = points[i - 1] || points[i];
            const p1 = points[i];
            const p2 = points[i + 1];
            const p3 = points[i + 2] || p2;
            
            const cp1x = p1.x + (p2.x - p0.x) * curve_tension;
            const cp1y = p1.y + (p2.y - p0.y) * curve_tension;
            const cp2x = p2.x - (p3.x - p1.x) * curve_tension;
            const cp2y = p2.y - (p3.y - p1.y) * curve_tension;
            
            d += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y}`;
          }
          return d;
        }
        
        const { path, fillPath } = buildSinglePath(rawPoints);
        
        let gridHtml = '';
        let yLabelsHtml = '';
        for (let i = 0; i <= yTicks; i++) {
          const yVal = scale.max - (scale.span / yTicks) * i;
          const yPos = scale.scaleY(yVal);
          gridHtml += `<line x1="${padding.left}" y1="${yPos}" x2="${width - padding.right}" y2="${yPos}" stroke="${colors.grid}" stroke-width="1" />`;
          yLabelsHtml += `<text x="${padding.left - 10}" y="${yPos + 4}" text-anchor="end" fill="${colors.text}" font-size="11">${unit_label}${Math.round(yVal)}</text>`;
        }
        
        let xLabelsHtml = '';
        const bottomY = height - padding.bottom;
        data.forEach((item, i) => {
          const xPos = scale.scaleX(i);
          xLabelsHtml += `<line x1="${xPos}" y1="${bottomY}" x2="${xPos}" y2="${bottomY + xTickSize}" stroke="#ccc" stroke-width="1" />`;
          xLabelsHtml += `<text x="${xPos}" y="${bottomY + xTickSize + 15}" text-anchor="middle" fill="${colors.text}" font-size="11">${item.xLabel}</text>`;
        });
        
        let pointLabelsHtml = '';
        validPoints.forEach(p => {
          pointLabelsHtml += `<text x="${p.x}" y="${p.y - 10}" text-anchor="middle" fill="#555" font-size="12" font-weight="bold">${unit_label}${p.value}</text>`;
        });
        
        const gradientId = `grad-${container_id.replace(/[^a-zA-Z0-9]/g, '')}`;
        const animName = `draw${container_id.replace(/[^a-zA-Z0-9]/g, '')}`;
        
        const svgContent = `
        <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="background: white; max-width:100%;">
          <defs>
            <linearGradient id="${gradientId}" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stop-color="${colors.gradientStart}" />
              <stop offset="100%" stop-color="${colors.gradientEnd}" />
            </linearGradient>
          </defs>
          
          ${gridHtml}
          
          ${fillPath ? `<path d="${fillPath}" fill="url(#${gradientId})" />` : ''}

          ${line.glow && path ? `
            <path d="${path}" fill="none" stroke="${line.color}" stroke-width="${line.width + 2}" stroke-linecap="round" stroke-linejoin="round" opacity="0.2" />
          ` : ''}
          
          ${path ? `
            <path d="${path}" fill="none" stroke="${line.color}" stroke-width="${line.width}" stroke-linecap="round" stroke-linejoin="round" stroke-dashoffset="100" pathLength="100" stroke-dasharray="100" class="chart-line-anim" style="animation-name: ${animName};" />
          ` : ''}
          
          ${validPoints.map(p => `
            <circle cx="${p.x}" cy="${p.y}" r="3.5" fill="white" stroke="${line.color}" stroke-width="2.5" />
          `).join('')}
          
          ${yLabelsHtml}
          ${xLabelsHtml}
          ${pointLabelsHtml}
          
          <style>
            .chart-line-anim {
              animation-duration: ${transition}s;
              animation-timing-function: cubic-bezier(0.57, -0.04, 0.41, 1);
              animation-fill-mode: forwards;
            }
            @keyframes ${animName} {
              to { stroke-dashoffset: 0; }
            }
          </style>
        </svg>
      `;
        
        document.getElementById(container_id).innerHTML = svgContent;
      };
      const createPie = (divObj, pieDataArray, radius = 80, transition = 1.8) => {
        divObj.style = `
  display: flex; 
  flex-direction:row; 
  align-items:center; 
  justify-content: space-around;
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  `
        let svgHtml = ""
        let cicleListTxt = ""
        let cssTxt = ""
        let legendListHtml = ""
        let offset = 0;
        
        const total_val = pieDataArray.reduce((sum, slice) => sum + slice.val, 0);
        const values = pieDataArray.map(slice => {

        })
        
        pieDataArray.forEach((slice, i) => {

          cicleListTxt += `
      <circle id="${"cir"+divObj.id+i}" r="${(radius/2+0.1)}" stroke-dashoffset="0" pathlength="100" stroke-dasharray="0 100" fill="transparent" stroke-width="${radius}" stroke="${slice.color}" />
    `
          cssTxt += `
    #${"cir"+divObj.id+i} {
      transform: rotate(-90deg);
      animation: gain${"cir"+divObj.id+i} ${transition}s cubic-bezier(0.57, -0.04, 0.41, 1) forwards;
      will-change: stroke-dashoffset, stroke-dasharray;
    }
    @keyframes gain${"cir"+divObj.id+i} {
      to {
        stroke-dashoffset: ${offset};
        stroke-dasharray: ${val} ${100-val}

    `
          legendListHtml += `

      <div style="background-color:${slice.color}; height: 14px; width: 14px; border-radius: 4px; margin-right:6px"></div>${slice.name}
    </div>
    `
          offset -= val
        })
        
        divObj.innerHTML = `
    <svg shape-rendering="geometricPrecision" height="${radius*2.5}" width="${radius*2.5}" viewBox="-${(radius*2.5)/2} -${(radius*2.5)/2} ${radius*2.5} ${radius*2.5}">
      ${cicleListTxt}
      <style>${cssTxt}</style>
    </svg>
    <div style="height:100%; gap:8px; display: flex; flex-direction: column; align-items: start; justify-content: center; flex: 1; padding-left: 10px;">
      ${legendListHtml}
      <style>
        .legend-${divObj.id} {
          opacity: 0;
          transform: translateY(60%);
          animation: rise${divObj.id} ${transition/2}s cubic-bezier(0.57, -0.04, 0.41, 1) forwards;
        }
        @keyframes rise${divObj.id} {
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
      </style>
    </div>
  `
      }
      
      // ---------- CHART DATA PREPARATION ----------
      
      // Helper to assign consistent colors

      const expenseColors = ['#9B2C2C', '#C53030', '#E53E3E', '#FC8181', '#F56565', '#E53E3E', '#C53030', '#9B2C2C'];
      
      function getColorForType(typeName, isExpense = false) {
        if (!typeColorMap[typeName]) {
          const colorArray = isExpense ? expenseColors : incomeColors;
          const index = Object.keys(typeColorMap).length % colorArray.length;
          typeColorMap[typeName] = colorArray[index];
        }
        return typeColorMap[typeName];
      }

      function renderDashboardChart() {
        const today = new Date();
        const listDays = {};
        
        for (let i = 6; i >= 0; i--) {
          const datee = new Date(today);
          datee.setDate(today.getDate() - i);
          listDays[formatDate(datee)] = [];

          mainData.cashInData.cash_ins :

        Object.keys(dataSource).forEach(key => {

        sortedDays.forEach(day => {

          let totalAmount = 0;
          entries.forEach(entry => {
            totalAmount += entry.amount;
          });

          const dayNum = dateObj.getDate();
          
          dayDataArray.push({
            xLabel: `${dayName} ${dayNum}`,
            value: totalAmount

        const gradientEnd = currentChartMode === 'income' ?
          'rgba(15, 123, 63, 0.05)' :
          'rgba(185, 28, 28, 0.05)';
        
        const containerWidth = chartContainer.clientWidth || 360;
        
        createLineChart({
          container_id: 'dashboard-chart',

          height: 200,
          data: dayDataArray,
          curve_tension: 0.25,

      // ---------- DERIVED CALCULATIONS ----------
      function recalcTotalBalance() {
        return mainData.total_balance;
      }
      
      function getTodayTotals() {
        const todayDate = formatDate(new Date());
        let inToday = 0,
          outToday = 0;
        Object.entries(mainData.cashInData.cash_ins).forEach(([key, val]) => {
          if (getDateOnlyFromKey(key) === todayDate) inToday += val.amount;
        });
        Object.entries(mainData.cashOutData.cash_outs).forEach(([key, val]) => {
          if (getDateOnlyFromKey(key) === todayDate) outToday += val.amount;
        });
        return { inToday, outToday };
      }
      
      async function saveDataToDB() {
        try {
          await data_functions.saveData(mainData);
          saveStatusEl.textContent = '💾 Saved';
          setTimeout(() => { saveStatusEl.textContent = '💾 Auto-saved'; }, 1500);
        } catch (e) {
          saveStatusEl.textContent = '⚠️ Save failed';
          console.error('Save error:', e);
        }
      }
      
      function updateDailyBalance(dateKey, transactionAmount) {
        // dateKey format: "2026-07-19"
        // transactionAmount: positive for income, negative for expense
        
        if (!mainData.daily_balances[dateKey]) {
          // First transaction of the day
          mainData.daily_balances[dateKey] = {
            start: mainData.total_balance,
            end: mainData.total_balance + transactionAmount
          };
        } else {
          // Additional transaction - only update end
          mainData.daily_balances[dateKey].end += transactionAmount;
        }
        
        // Update total balance
        mainData.total_balance += transactionAmount;
      }
      
      function updateAllUI() {
        const balance = recalcTotalBalance();
        totalBalanceEl.textContent = `৳${balance.toLocaleString()}`;
        
        const { inToday, outToday } = getTodayTotals();
        todayIncomeEl.textContent = `৳${inToday} in`;
        todayExpenseEl.textContent = `৳${outToday} out`;
        
        const incomeTypes = Object.keys(mainData.cashInData.cash_in_types).length;
        const expenseTypes = Object.keys(mainData.cashOutData.cash_out_types).length;
        dashIncomeTypes.textContent = incomeTypes;
        dashExpenseTypes.textContent = expenseTypes;
        
        renderEntriesByFilter();
        renderDashboardChart();

          renderPieCharts();

      // Filter logic
      function getFilteredEntries() {
        const fromVal = fromDateInput.value;
        const toVal = toDateInput.value;
        const gotoVal = gotoDateInput.value;
        
        let effectiveFrom = fromVal;
        let effectiveTo = toVal;
        
        if (gotoVal) {
          effectiveFrom = gotoVal;
          effectiveTo = gotoVal;
        }
        
        const allEntries = [];
        
        Object.entries(mainData.cashInData.cash_ins).forEach(([key, val]) => {
          const dateOnly = getDateOnlyFromKey(key);
          if (effectiveFrom && dateOnly < effectiveFrom) return;
          if (effectiveTo && dateOnly > effectiveTo) return;
          allEntries.push({ key, ...val, direction: 'in' });
        });
        
        Object.entries(mainData.cashOutData.cash_outs).forEach(([key, val]) => {
          const dateOnly = getDateOnlyFromKey(key);
          if (effectiveFrom && dateOnly < effectiveFrom) return;
          if (effectiveTo && dateOnly > effectiveTo) return;
          allEntries.push({ key, ...val, direction: 'out' });
        });
        
        allEntries.sort((a, b) => a.key.localeCompare(b.key));
        allEntries.reverse()
        
        if (currentTab === 'income') return allEntries.filter(e => e.direction === 'in');
        if (currentTab === 'expense') return allEntries.filter(e => e.direction === 'out');
        return allEntries;
      }
      
      function computeStartEndBalance(entries) {
        if (entries.length === 0) {
          const gotoVal = gotoDateInput.value;
          if (gotoVal && mainData.daily_balances[gotoVal]) {
            return {
              start: mainData.daily_balances[gotoVal].start,
              end: mainData.daily_balances[gotoVal].end
            };
          }
          return { start: 0, end: 0 };
        }
        
        const firstEntryDate = getDateOnlyFromKey(entries[0].key);
        const lastEntryDate = getDateOnlyFromKey(entries[entries.length - 1].key);
        
        const startBalance = mainData.daily_balances[firstEntryDate]?.start ?? 0;
        const endBalance = mainData.daily_balances[lastEntryDate]?.end ?? 0;
        
        return { start: startBalance, end: endBalance };
      }
      
      function rebuildDailyBalances() {
        mainData.daily_balances = {};
        mainData.total_balance = 0;
        
        // Collect all transactions sorted by date
        const allTransactions = [];
        
        Object.entries(mainData.cashInData.cash_ins).forEach(([key, val]) => {
          allTransactions.push({ date: getDateOnlyFromKey(key), amount: val.amount, key });
        });
        
        Object.entries(mainData.cashOutData.cash_outs).forEach(([key, val]) => {
          allTransactions.push({ date: getDateOnlyFromKey(key), amount: -val.amount, key });
        });
        
        // Sort by full datetime key
        allTransactions.sort((a, b) => a.key.localeCompare(b.key));
        
        // Process in order
        allTransactions.forEach(trans => {
          updateDailyBalance(trans.date, trans.amount);
        });
      }
      
      function renderEntriesByFilter() {
        const filtered = getFilteredEntries();
        const { start, end } = computeStartEndBalance(filtered);
        startingBalanceEl.textContent = `৳${start.toLocaleString()}`;
        endingBalanceEl.textContent = `৳${end.toLocaleString()}`;
        
        if (filtered.length === 0) {
          entriesDiv.innerHTML = '<div style="color:#64748b; padding:1rem; text-align:center;">No entries for this period.</div>';
          return;
        }
        
        entriesDiv.innerHTML = filtered.map(entry => {
          const datePart = entry.key.replace('T', ' ');
          const amountFormatted = `৳${entry.amount.toLocaleString()}`;
          const typeInfo = entry.type || '';
          const meta = entry.from ? `From ${entry.from}` : (entry.description || '');
          const colorClass = entry.direction === 'in' ? 'in-color' : 'out-color';
          return `
          <div class="entry-item">
            <div class="entry-left">
              <span class="entry-type">${typeInfo}</span>
              <span class="entry-meta">${datePart} · ${meta}</span>
            </div>
            <span class="entry-amount ${colorClass}">${entry.direction==='in'?'+':'-'} ${amountFormatted}</span>
          </div>
        `;
        }).join('');
      }

          if (!amount || amount <= 0) {
            alert('Enter valid amount');
            return;
          }
          let type = document.getElementById('modal-type').value;
          const newType = document.getElementById('modal-new-type').value.trim();
          if (newType) type = newType;
          if (!type) {
            alert('Please select or enter a type');
            return;
          }
          const desc = document.getElementById('modal-desc')?.value || '';
          const from = isIn ? (document.getElementById('modal-from')?.value || '') : '';
          
          const dateKey = getNowDate();
          
          if (isIn) {
            mainData.cashInData.cash_ins[dateKey] = { amount, type, from, description: desc };
            if (!mainData.cashInData.cash_in_types[type]) {
              mainData.cashInData.cash_in_types[type] = { total_in: 0 };
            }
            mainData.cashInData.cash_in_types[type].total_in += amount;
          } else {
            mainData.cashOutData.cash_outs[dateKey] = { amount, type, description: desc };
            if (!mainData.cashOutData.cash_out_types[type]) {
              mainData.cashOutData.cash_out_types[type] = { total_out: 0 };
            }
            mainData.cashOutData.cash_out_types[type].total_out += amount;
          }
          const dateOnly = getDateOnlyFromKey(dateKey);
          const transactionAmount = isIn ? amount : -amount;
          updateDailyBalance(dateOnly, transactionAmount);
          
          updateAllUI();
          closeModal();
        });
      }

        dashboardChart.style.display = 'none';
        incomePieChart.style.display = 'flex';
        expensePieChart.style.display = 'flex';
        piesWrapper.style.display = "block";
        // Arrange pies side by side on mobile or stacked
        const pieContainer = document.querySelector('.chart-container').parentElement;
        incomePieChart.style.flexDirection = 'row';
        expensePieChart.style.flexDirection = 'row';
        renderPieCharts();
      });
      // Close modal on overlay click
      modalContainer.addEventListener('click', (e) => {
        if (e.target === modalContainer) closeModal();
      });
      
      // Handle window resize for chart
      let resizeTimeout;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          renderDashboardChart();
        }, 250);
      });
      
      // ---------- INITIALIZATION ----------
      async function init() {
        try {
          const savedData = await data_functions.getData();
          if (savedData) {
            mainData = savedData;
          }
        } catch (e) {
          console.log('No saved data found, using defaults');
        }
        
        // Set default dates for filters (last 7 days)
        const today = new Date();
        const sevenDaysAgo = new Date(today);
        sevenDaysAgo.setDate(today.getDate() - 6);
        
        fromDateInput.value = formatDate(sevenDaysAgo);
        toDateInput.value = formatDate(today);
        rebuildDailyBalances()
        updateAllUI();
      }
      
      init();
    })();
  </script>
  
</body>

</html>
